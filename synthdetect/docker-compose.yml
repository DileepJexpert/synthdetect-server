version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: synthdetect
      POSTGRES_USER: synthdetect
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synthdetect"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  ml-engine:
    build: ./ml-engine
    ports:
      - "8000:8000"
    environment:
      DEBUG: "false"
      DEVICE: "cpu"
      MODEL_CACHE_DIR: /app/model_cache
    volumes:
      - ml_model_cache:/app/model_cache
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  api-gateway:
    build: ./api-gateway
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: synthdetect
      DB_USER: synthdetect
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ML_ENGINE_URL: http://ml-engine:8000
      SPRING_PROFILES_ACTIVE: dev
      JWT_SECRET: ${JWT_SECRET:-synthdetect-default-jwt-secret-change-in-production-must-be-256-bits}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ml-engine:
        condition: service_healthy

volumes:
  postgres_data:
  ml_model_cache:
