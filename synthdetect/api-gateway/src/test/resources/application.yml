spring:
  application:
    name: synthdetect-api-test
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration
      - org.springframework.boot.actuate.autoconfigure.data.redis.RedisHealthContributorAutoConfiguration
      - org.springframework.boot.actuate.autoconfigure.data.redis.RedisReactiveHealthContributorAutoConfiguration

  datasource:
    url: jdbc:h2:mem:synthdetect-test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: true

  flyway:
    enabled: false

  data:
    redis:
      host: localhost
      port: 6379

jwt:
  secret: test-jwt-secret-that-is-long-enough-for-hmac-sha256-algorithm-requirements
  expiration-ms: 86400000
  refresh-expiration-ms: 604800000

auth:
  api-key:
    prefix: "sd_"
    length: 32
    hash-algorithm: SHA-256

ml-engine:
  base-url: http://localhost:8000
  timeout-ms: 5000
  retry-max-attempts: 1

rate-limit:
  default-rpm: 60
  plans:
    FREE: 30
    STARTER: 120
    BUSINESS: 600
    ENTERPRISE: 3000

plan-limits:
  FREE: 500
  STARTER: 10000
  BUSINESS: 100000
  ENTERPRISE: -1

content:
  image:
    max-size-mb: 20
    supported-formats: [jpeg, jpg, png, webp, gif, bmp]
  text:
    min-chars: 50
    max-chars: 100000
  batch:
    max-items: 50

compliance:
  default-jurisdiction: india_it_rules_2026
  takedown-deadline-hours: 3
  supported-languages: [en, hi, ta, te, bn, mr, kn, gu]
