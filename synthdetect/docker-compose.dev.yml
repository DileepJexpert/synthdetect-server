version: '3.8'

# Development override — run only infrastructure services
# Usage: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up postgres redis
services:
  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  # Don't start the API gateway in dev — run it from IDE
  api-gateway:
    profiles:
      - full
